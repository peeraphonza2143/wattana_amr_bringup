laser_filter:             # 1. ชื่อนี้ต้องตรงกับ Launch File เป๊ะๆ
  ros__parameters:
    filter1:
      name: box_filter
      type: laser_filters/LaserScanBoxFilter
      params:
        box_frame: base_link    # 2. ยึด "ตัวรถ" เป็นหลัก (ห้ามใช้ laser เดี๋ยวงง)
        
        # --- โซนกำหนดพื้นที่ (The Box) ---
        # เราจะวาดสี่เหลี่ยมผืนผ้าใหญ่ๆ ครอบ "หน้ารถ" ไว้
        
        min_x: -0.50      # 3. ขอบล่าง: เริ่มที่ล้อรถ (ถอยหลังนิดหน่อย -15cm เพื่อให้เห็นกันชนนิดๆ)
        max_x: 0.20       # 4. ขอบบน: ยืดไปข้างหน้ายาวๆ 10 เมตร (สุดสายตา)
        
        min_y: -2.0       # 5. ขอบซ้าย: กว้างออกไป 5 เมตร
        max_y: 2.0        # 6. ขอบขวา: กว้างออกไป 5 เมตร
        
        min_z: -5.5       # 7. ความสูง: ครอบคลุมพื้นถึงเพดาน
        max_z: 5.0
        
        invert: false     # 8. กฎเหล็ก: false = "เก็บของในกล่องไว้" (นอกกล่องลบทิ้ง)

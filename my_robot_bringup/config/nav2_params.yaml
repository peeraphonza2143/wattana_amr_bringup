# ════════════════════════════════════════════════════════
#  nav2_params.yaml — Nav2 Configuration for AMR Robot
# ════════════════════════════════════════════════════════

amcl:
  ros__parameters:
    use_sim_time: false
    # ── Motion Model Noise ────────────────────────────────
    alpha1: 0.2           # Noise จากการหมุน → หมุน
    alpha2: 0.2           # Noise จากการหมุน → เคลื่อนที่ตรง
    alpha3: 0.2           # Noise จากการเคลื่อนที่ตรง → เคลื่อนที่ตรง
    alpha4: 0.2           # Noise จากการเคลื่อนที่ตรง → หมุน
    alpha5: 0.2           # Noise พิเศษ (สำหรับ Omni Drive)
    # ── Frames ───────────────────────────────────────────
    base_frame_id: base_link    # Frame ของตัวหุ่น
    global_frame_id: map        # Frame ของแผนที่
    odom_frame_id: odom         # Frame ของ Odometry
    scan_topic: /scan_filtered  # รับ LiDAR ที่กรองแล้วจาก Module 17
    robot_model_type: nav2_amcl::DifferentialMotionModel
    # ── Laser Model ───────────────────────────────────────
    laser_model_type: likelihood_field
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    max_beams: 60
    # ── Particle Filter ───────────────────────────────────
    max_particles: 2000   # จำนวน Particle สูงสุด (มากขึ้น = แม่นยำขึ้น แต่ CPU สูงขึ้น)
    min_particles: 500    # จำนวน Particle ต่ำสุด
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1
    # ── Update Thresholds ─────────────────────────────────
    update_min_d: 0.25    # เคลื่อนที่อย่างน้อย 0.25 ม. จึง update ตำแหน่ง
    update_min_a: 0.2     # หมุนอย่างน้อย 0.2 rad จึง update ตำแหน่ง
    transform_tolerance: 1.0
    save_pose_rate: 0.5
    tf_broadcast: true
    set_initial_pose: false
    always_reset_initial_pose: false
    first_map_only: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0       # ความถี่ในการคำนวณ Local Path (Hz)
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25        # ระยะ Tolerance ของตำแหน่งเมื่อถึงเป้าหมาย (ม.)
      yaw_goal_tolerance: 0.25       # มุม Tolerance เมื่อถึงเป้าหมาย (rad)

    # ── DWB Local Planner ─────────────────────────────────
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      # ── ขีดจำกัดความเร็ว (ปรับตาม Spec หุ่นยนต์จริง) ──
      min_vel_x: 0.0
      max_vel_x: 0.3        # ความเร็วสูงสุดเดินหน้า (m/s)
      max_vel_y: 0.0        # Differential Drive ไม่มีการเลื่อนข้าง
      max_vel_theta: 1.0    # ความเร็วหมุนสูงสุด (rad/s)
      max_speed_xy: 0.3
      # ── อัตราเร่ง/หน่วง ───────────────────────────────
      acc_lim_x: 2.5        # อัตราเร่งสูงสุดแนวหน้า (m/s²)
      acc_lim_theta: 3.2    # อัตราเร่งหมุนสูงสุด (rad/s²)
      decel_lim_x: -2.5     # อัตราหน่วงสูงสุดแนวหน้า (m/s²)
      decel_lim_theta: -3.2
      # ── Trajectory Sampling ───────────────────────────
      vx_samples: 20        # จำนวน Sample ความเร็วแนวหน้าที่ประเมิน
      vtheta_samples: 20    # จำนวน Sample ความเร็วหมุนที่ประเมิน
      sim_time: 1.7         # จำลองล่วงหน้า 1.7 วินาที
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      # ── Critics (ตัวตัดสินเส้นทางที่ดี) ──────────────
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle",
                "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5        # ระยะ Tolerance ของ Goal บน Costmap (ม.)
      use_astar: false      # false = Dijkstra, true = A* (เร็วกว่าแต่ไม่เหมาะ Map เล็ก)
      allow_unknown: true   # อนุญาตให้วางแผนผ่านพื้นที่ Unknown

behavior_server:
  ros__parameters:
    use_sim_time: false
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"           # หมุนตัวเองเพื่อหาทาง
    backup:
      plugin: "nav2_behaviors/BackUp"         # ถอยหลังเมื่อติดขัด
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading" # เดินหน้าตรงๆ
    wait:
      plugin: "nav2_behaviors/Wait"           # รอและลองใหม่
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200  # หยุดรอ 200 ms ที่แต่ละ Waypoint

# ── Global Costmap — ใช้แผนที่ทั้งหมดในการวางแผนเส้นทางหลัก ──────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0       # อัปเดต Costmap ทุก 1 วินาที
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      # Footprint หุ่นยนต์ กว้าง 0.575m ยาว 0.65m (รูปสี่เหลี่ยม)
      footprint: "[[-0.325, -0.2875], [0.325, -0.2875], [0.325, 0.2875], [-0.325, 0.2875]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_filtered   # ใช้ข้อมูล LiDAR ที่กรองแล้ว
          max_obstacle_height: 2.0
          clearing: true          # ลบสิ่งกีดขวางที่หายไปออกจาก Costmap
          marking: true           # เพิ่มสิ่งกีดขวางใหม่เข้า Costmap
          data_type: LaserScan
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55    # โซนห้ามเข้ารอบสิ่งกีดขวาง (ม.)
      always_send_full_costmap: true

# ── Local Costmap — พื้นที่ 3x3 ม. รอบตัวหุ่น สำหรับหลบสิ่งกีดขวาง ──
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0       # อัปเดตทุก 0.2 วินาที (Real-time)
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true        # กรอบเลื่อนตามตัวหุ่น
      width: 3                    # ความกว้าง Costmap (ม.)
      height: 3                   # ความสูง Costmap (ม.)
      resolution: 0.05
      footprint: "[[-0.325, -0.2875], [0.325, -0.2875], [0.325, 0.2875], [-0.325, 0.2875]]"
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_filtered
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""             # กำหนดโดย Launch File

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
